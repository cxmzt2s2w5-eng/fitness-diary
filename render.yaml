services:
  - type: web
    name: fitness-diary-auth-cxmzt2s2w5
    runtime: python
    rootDir: backend/auth-service
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false

  - type: web
    name: fitness-diary-diary-cxmzt2s2w5
    runtime: python
    rootDir: backend/diary-service
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
